<!DOCTYPE html>
<html>
<head><title>Connecting to Google...</title></head>
<body>
<p style="font-family:sans-serif;text-align:center;margin-top:40px;color:#666">
  Connecting to Google Calendar...<br>
  <small>This window will close automatically.</small>
</p>
<script>
  // Extract access token from URL hash
  const hash = window.location.hash.substring(1);
  const params = new URLSearchParams(hash);
  const token     = params.get('access_token');
  const expiresIn = parseInt(params.get('expires_in') || '3600');
  const error     = params.get('error');

  if (token) {
    // Store in localStorage so dashboard can read it
    localStorage.setItem('kb_gcal_token_pending', token);
    localStorage.setItem('kb_gcal_expiry_pending', String(Date.now() + expiresIn * 1000));
    
    // Also try postMessage for desktop browsers
    try {
      window.opener?.postMessage({
        type: 'google-token', token, expiresIn
      }, 'https://utu72.github.io');
    } catch(e) {}

    document.body.innerHTML = '<p style="font-family:sans-serif;text-align:center;margin-top:60px;color:green;font-size:18px">✅ Connected!<br><br><small style=\"color:#666\">Return to Utu\'s Board and tap Sync Now</small></p>';
    setTimeout(() => {
      try { window.close(); } catch(e) {}
    }, 2000);
  } else if (error) {
    document.body.innerHTML = `<p style="font-family:sans-serif;text-align:center;margin-top:40px;color:red">❌ Error: ${error}<br><small>Close this window and try again.</small></p>`;
  }
</script>
</body>
</html>
